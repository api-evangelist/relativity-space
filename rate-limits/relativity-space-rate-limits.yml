  Relativity Space does not expose a public developer API, so there are no API
  rate limits, quotas, throttling policies, or HTTP response codes to document.
  This artifact exists only to record - honestly - that no programmatic
  interface (and therefore no rate-limiting surface) is published by the
  provider.
