aid: relativity-space
url: https://raw.githubusercontent.com/api-evangelist/relativity-space/refs/heads/main/apis.yml
name: Relativity Space
kind: company
description: Relativity Space is an aerospace manufacturer building Terran R, a reusable
  medium-to-heavy lift orbital launch vehicle produced with the company's proprietary
  Stargate metal 3D printing platform in Long Beach, CA. The company sells launch
  services - dedicated and rideshare payload missions to LEO and GTO - to government,
  commercial, and telecommunications customers. Relativity Space does not publish a
  public developer API; its developer-facing artifact is the Terran payload user's
  guide (mission integration documentation), not a programmatic interface.
