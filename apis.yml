  description: Terran R is a reusable medium-to-heavy lift launch vehicle offering
    up to 23,500 kg to LEO (downrange landing) and 5,500 kg to GTO, with a planned
    first launch from Launch Complex 16 at Cape Canaveral. This is a launch-services
    product surface, not a programmatic API - there is no public developer API.
