principles:
- name: Visibility
  description: >-
    No API usage to meter; spend visibility is at the launch-service contract
    level, tracked through procurement, not usage exports.
- name: Allocation
  description: >-
    Allocate launch-service contract costs to the mission / program they
    support; there are no API keys or per-call usage to tag.
- name: Optimization
  description: >-
    Optimize via rideshare vs. dedicated launch selection and contract terms,
    not usage-tier tuning.
- name: Accountability
  description: >-
    Assign mission / program owners to each launch-service agreement and review
    contract commitments against budget.
