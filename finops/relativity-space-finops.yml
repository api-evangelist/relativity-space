description: >-
  FinOps view of Relativity Space spend. Relativity Space does not bill any
  usage-based API consumption; it sells contract-based Terran R launch
  services (dedicated and rideshare payload missions). There are no
  per-call, per-token, or per-unit API meters to track. Cost management here
  is procurement of launch-service agreements, not cloud-style usage
  optimization, so this artifact is informational and largely empty.
notes: >-
  Informational record for an aerospace manufacturer with no public API and no
  metered billing. If a programmatic, usage-billed product ever appears,
  reconcile meters and FOCUS columns against it.
