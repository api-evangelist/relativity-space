actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    Cataloged Relativity Space honestly as an aerospace manufacturer with no
    public developer API. Three informational product surfaces were recorded
    (Terran R Launch, Stargate Manufacturing, Payload / Rideshare), an empty
    OpenAPI contract (paths: {}) was authored, and the provider was explicitly
    disambiguated from Relativity / RelativityOne (the unrelated legal
    e-discovery company already in the catalog). No fabricated endpoints,
    base URLs, or authentication were introduced.
