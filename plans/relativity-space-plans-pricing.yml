description: >-
  Relativity Space does not sell a metered API product, so there is no
  API pricing or plan structure to document. The company's commercial model
  is launch-service agreements (LSAs) for Terran R missions - dedicated and
  rideshare payload launches - negotiated directly with customers as
  multi-launch contracts. Pricing is contract-based and not publicly listed;
  reported customer backlog exceeds $3B across government, commercial, and
  telecommunications customers. No public per-call, per-token, or
  subscription API rates exist.
notes: >-
  This is an informational record for an aerospace manufacturer with no public
  developer API. Launch pricing is bespoke and obtained via Relativity Space
  sales; reconcile against any future published pricing if the company ever
  exposes a programmatic product.
